name: 食べログ自動チェック

on:
  schedule:
    # 毎日 9:00 JST（UTC 0:00）— 実際のチェックは毎月3〜10日のみ（check_scheduled.py内で判定）
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 食べログチェックを実行
        run: python check_scheduled.py
        env:
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SHEETS_WORKSHEET_NAME: ${{ secrets.GOOGLE_SHEETS_WORKSHEET_NAME }}
          GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
          LINE_MESSAGING_ENABLED: ${{ secrets.LINE_MESSAGING_ENABLED }}
          LINE_MESSAGING_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_MESSAGING_CHANNEL_ACCESS_TOKEN }}
          LINE_MESSAGING_USER_ID: ${{ secrets.LINE_MESSAGING_USER_ID }}
          EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

      - name: 結果CSVを保存
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tabelog-check-${{ github.run_number }}
          path: results/*.csv
          retention-days: 90
          if-no-files-found: ignore
